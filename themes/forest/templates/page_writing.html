{{ template "header.html" .}}

  <div style="padding: 40px 15px;">
    <div class="glass-card">
      <h1 style="font-weight: 700; margin-bottom: 30px; color: #1c2e1c;">{{ .page.Title }}</h1>
      {{ if .is_admin }}
      <p><a href="/admin/pages/{{ .page.ID }}" style="color: #2d5a27; font-size: 13px;">Edit this page</a></p>
      {{ end }}

      {{ range .posts }}
      <article style="margin-bottom: 28px; padding-bottom: 28px; border-bottom: 1px solid rgba(45,90,39,0.1);">
        <h2 style="margin-bottom: 5px;"><a href="{{ .Permalink }}" title="{{ .Title }}" style="color: #1c2e1c; text-decoration: none;">{{ .Title }}</a></h2>
        <p style="color: #7a937a; font-size: 13px; margin-bottom: 10px;">{{ .CreatedAt.Format "January 2, 2006" }}
          {{ range .Tags }}
            <a href="{{ .Permalink }}" title="{{ .Name}}" style="color: #2d5a27;">#{{ .Name }}</a>
          {{ end }}
        </p>
        <p style="color: #3d4d3d; line-height: 1.6; font-size: 14px;">
          {{ .HTMLPreview 200 }}
        </p>
      </article>
      {{ end }}
    </div>
  </div>

{{ template "footer.html" .}}
