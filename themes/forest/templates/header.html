{{ template "_head" . }}
<body>
  <div id="header" style="background: rgba(30, 50, 30, 0.6); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); padding: 14px 0;">
    <div class="container" style="max-width: 780px; padding: 0 15px;">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <nav id="navigation" style="display: flex; align-items: center; gap: 20px; flex-wrap: wrap;">
          <a href="/" title="Home" style="color: #fff; text-decoration: none; font-weight: 700; font-size: 16px; margin-right: 8px;">{{ .settings.site_logo_letters.Value }}</a>
          {{ range .nav_pages }}
          <a href="/{{ .Slug }}" title="{{ .Title }}" style="color: rgba(255,255,255,0.8); text-decoration: none; font-size: 13px;">{{ .Title }}</a>
          {{ end }}
          {{ if .is_admin }}
            <a href="/admin" title="Admin" style="color: rgba(255,255,255,0.8); text-decoration: none; font-size: 13px;">Admin</a>
          {{ end }}
          {{ if .logged_in }}
            <a href="/logout" title="Logout" style="color: rgba(255,255,255,0.8); text-decoration: none; font-size: 13px;">Logout</a>
          {{ else }}
            <a href="/login" title="Login" style="color: rgba(255,255,255,0.8); text-decoration: none; font-size: 13px;">Login</a>
          {{ end }}
        </nav>
        <form action="/search" method="GET" style="margin: 0;">
          <input type="text" name="q" placeholder="Search..." class="nav-search-input" aria-label="Search site" />
        </form>
      </div>
    </div>
  </div>
  <div class="wrapper">
