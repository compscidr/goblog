{{ template "header.html" .}}

<div style="padding: 40px 15px;"><div class="glass-card">
    <h1 class="text-left" style="color: #1c2e1c;">{{ .page.Title }}</h1>
    {{ if .is_admin }}
    <p class="text-left"><a href="/admin/pages/{{ .page.ID }}" style="color: #2d5a27;">Edit this page</a></p>
    {{ end }}
    {{ range .tags }}
        <div class="row">
            <div class="container text-left">
                {{ if .Posts }}
                <h3><a href="{{ .Permalink }}" title="{{ .Name }}" style="color: #2d5a27;">{{ .Name }}</a></h3>
                <ul>
                {{ range .Posts }}
                    {{ if .Draft }}
                    {{ else }}
                    <li><a href="{{ .Permalink }}" title="{{ .Title }}" style="color: #1c2e1c;">{{ .Title }}</a></li>
                    {{ end }}
                {{ end }}
                </ul>
                {{ end }}
            </div>
        </div>
    {{ end }}
</div></div>

{{ template "footer.html" .}}
