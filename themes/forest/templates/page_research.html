{{ template "header.html" .}}

  <div style="padding: 40px 15px;"><div class="glass-card">
    <h1 style="color: #1c2e1c;">{{ .page.Title }}</h1>
    {{ if .is_admin }}
    <p class="text-left"><a href="/admin/pages/{{ .page.ID }}" style="color: #2d5a27;">Edit this page</a></p>
    {{ end }}
    {{ if .errors }}
    <div class="alert alert-danger" role="alert">
      {{ .errors }}
    </div>
    {{ end }}
    {{range .articles}}
      <div class="row research">
        <div class="col-8">
          <a href="{{.ScholarURL}}" style="color: #2d5a27;">{{.Title}}</a> <br/>
          <span style="color: #7a937a;">{{.Authors}}</span> <br/>
        </div>
        <div class="col" style="color: #7a937a;">{{.Year}}</div>
      </div>
    {{end}}
  </div></div>

{{ template "footer.html" .}}
