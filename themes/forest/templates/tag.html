{{ template "header.html" .}}

  <div style="padding: 40px 15px;"><div class="glass-card">

    <h1 class="text-left" style="color: #1c2e1c;">Posts with Tag: {{.tag}}</h1>

    {{ range .posts }}
      {{ if .Draft }}
      {{ else }}
    <div class="row">
      <div class="container left">
          <h2 class="text-left"><a href="{{ .Permalink }}" style="color: #1c2e1c;">{{ .Title }}</a></h2>
          <p class="blog-post-meta text-left" style="color: #7a937a;">{{ .CreatedAt.Format "Jan 02, 2006 15:04:05 UTC" }}</p>
          <p class="text-left">
            {{ .HTMLPreview 100 }}
          </p>

      </div>
    </div>
      {{ end }}
    {{ end }}

  </div></div>

{{ template "footer.html" .}}
