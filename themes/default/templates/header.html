{{ template "_head" . }}
<body>
  <div id="header" class="text-center">
    <div class="container">
      <a href="/" class="logo" title="Home: {{ .settings.site_title.Value }}">{{ .settings.site_logo_letters.Value }}</a>
    </div>
    <div class="menu clearfix" id="navigation">
      <a href="/" title="Home: {{ .settings.site_title.Value }}">Home</a>
      {{ range .nav_pages }}
      <a href="/{{ .Slug }}" title="{{ .Title }}">{{ .Title }}</a>
      {{ end }}
      {{ if .is_admin }}
        <a href="/admin" title="Admin">Admin</a>
      {{ end }}
      {{ if .logged_in }}
        <a href="/logout" title="Logout">Logout</a>
      {{ else }}
        <a href="/login" title="Login">Login</a>
      {{ end }}
      <form action="/search" method="GET" class="nav-search">
        <input type="text" name="q" placeholder="Search..." class="nav-search-input" aria-label="Search site" />
      </form>
    </div>
  </div>
  <div class="wrapper">
