{{ template "header.html" .}}

  <div class="container" style="max-width: 720px; padding-top: 40px;">

    <h1 style="font-weight: 600; margin-bottom: 30px;">Posts</h1>

    {{ range .posts }}
    <article style="margin-bottom: 35px; padding-bottom: 35px; border-bottom: 1px solid #e5e7eb;">
      <h2 style="margin-bottom: 5px;"><a href="{{ .Permalink }}" title="{{ .Title }}" style="color: #1a1a1a; text-decoration: none;">{{ .Title }}</a></h2>
      <p style="color: #888; font-size: 13px; margin-bottom: 10px;">{{ .CreatedAt.Format "January 2, 2006" }}
        {{ range .Tags }}
          <a href="{{ .Permalink }}" title="{{ .Name}}" style="color: #2563eb;">#{{ .Name }}</a>
        {{ end }}
      </p>
      <p style="color: #444; line-height: 1.6;">
        {{ .HTMLPreview 200 }}
      </p>
    </article>
    {{ end }}
  </div>

{{ template "footer.html" .}}
