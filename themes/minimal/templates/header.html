{{ template "_head" . }}
<body>
  <div id="header" style="background: #f8fafc; border-bottom: 1px solid #e2e8f0;">
    <div class="container" style="max-width: 720px; padding: 12px 15px;">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <nav id="navigation" style="display: flex; align-items: center; gap: 18px; flex-wrap: wrap;">
          <a href="/" title="Home" style="color: #2563eb; text-decoration: none; font-weight: 600; font-size: 15px; margin-right: 8px;">{{ .settings.site_logo_letters.Value }}</a>
          {{ range .nav_pages }}
          <a href="/{{ .Slug }}" title="{{ .Title }}" style="color: #64748b; text-decoration: none; font-size: 13px;">{{ .Title }}</a>
          {{ end }}
          {{ if .is_admin }}
            <a href="/admin" title="Admin" style="color: #64748b; text-decoration: none; font-size: 13px;">Admin</a>
          {{ end }}
          {{ if .logged_in }}
            <a href="/logout" title="Logout" style="color: #64748b; text-decoration: none; font-size: 13px;">Logout</a>
          {{ else }}
            <a href="/login" title="Login" style="color: #64748b; text-decoration: none; font-size: 13px;">Login</a>
          {{ end }}
        </nav>
        <form action="/search" method="GET" style="margin: 0;">
          <input type="text" name="q" placeholder="Search..." class="nav-search-input" aria-label="Search site" />
        </form>
      </div>
    </div>
  </div>
  <div class="wrapper">
