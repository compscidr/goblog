{{ template "header.html" .}}
<div class="container">
    <div class="nav-scroller bg-body shadow-sm">
        <nav class="nav nav-underline" aria-label="Secondary navigation">
            <a class="nav-link" href="/admin/dashboard">Dashboard</a>
            <a class="nav-link" href="/admin/posts">All Posts</a>
            <a class="nav-link" href="/admin/newpost">New Post</a>
            <a class="nav-link active" aria-current="page" href="/admin/pages">Pages</a>
            <a class="nav-link" href="/admin/post-types">Post Types</a>
            <a class="nav-link" href="/admin/settings">Settings</a>
        </nav>
    </div>
    <h1>Edit Page: {{ .page.Title }}</h1>

    <div id="ajax-error" class="alert alert-danger" role="alert" style="display: none;"></div>
    <div id="ajax-success" class="alert alert-success" role="alert" style="display: none;"></div>

    <form id="page-form">
        <div class="mb-3">
            <label for="title" class="form-label">Title</label>
            <input type="text" class="form-control" id="title" value="{{ .page.Title }}" required>
        </div>

        <div class="mb-3">
            <label for="slug" class="form-label">Slug (URL path)</label>
            <div class="input-group">
                <span class="input-group-text">/</span>
                <input type="text" class="form-control" id="slug" value="{{ .page.Slug }}" required>
            </div>
        </div>

        <div class="mb-3">
            <label for="page_type" class="form-label">Page Type</label>
            <select class="form-select" id="page_type">
                <option value="writing" {{ if eq .page.PageType "writing" }}selected{{ end }}>Writing (post listing)</option>
                <option value="research" {{ if eq .page.PageType "research" }}selected{{ end }}>Research (Google Scholar)</option>
                <option value="about" {{ if eq .page.PageType "about" }}selected{{ end }}>About (markdown content)</option>
                <option value="custom" {{ if eq .page.PageType "custom" }}selected{{ end }}>Custom (markdown content)</option>
                <option value="tags" {{ if eq .page.PageType "tags" }}selected{{ end }}>Tags (tag listing)</option>
                <option value="archives" {{ if eq .page.PageType "archives" }}selected{{ end }}>Archives (posts by date)</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="hero_url" class="form-label">Hero URL</label>
            <input type="text" class="form-control" id="hero_url" value="{{ .page.HeroURL }}" placeholder="/img/hero.jpg or /vid/hero.mp4">
        </div>

        <div class="mb-3">
            <label for="hero_type" class="form-label">Hero Type</label>
            <select class="form-select" id="hero_type">
                <option value="" {{ if eq .page.HeroType "" }}selected{{ end }}>None</option>
                <option value="image" {{ if eq .page.HeroType "image" }}selected{{ end }}>Image</option>
                <option value="video" {{ if eq .page.HeroType "video" }}selected{{ end }}>Video</option>
            </select>
        </div>

        <div class="mb-3" id="post-type-filter-section" style="{{ if ne .page.PageType "writing" }}display:none;{{ end }}">
            <label for="post_type_id" class="form-label">Filter by Post Type <small>(optional, leave blank to show all)</small></label>
            <select class="form-select" id="post_type_id">
                <option value="">All post types</option>
                {{ range $.post_types }}
                <option value="{{ .ID }}">{{ .Name }}</option>
                {{ end }}
            </select>
        </div>

        <div class="mb-3" id="scholar-section" style="{{ if ne .page.PageType "research" }}display:none;{{ end }}">
            <label for="scholar_id" class="form-label">Google Scholar ID</label>
            <input type="text" class="form-control" id="scholar_id" value="{{ .page.ScholarID }}">
        </div>

        <div class="mb-3" id="content-section" style="{{ if or (eq .page.PageType "writing") (eq .page.PageType "research") (eq .page.PageType "tags") (eq .page.PageType "archives") }}display:none;{{ end }}">
            <label for="content" class="form-label">Content (Markdown)</label>
            <textarea rows="15" class="form-control" id="content">{{ .page.Content }}</textarea>
        </div>

        <div class="row mb-3">
            <div class="col-md-3">
                <label for="nav_order" class="form-label">Nav Order</label>
                <input type="number" class="form-control" id="nav_order" value="{{ .page.NavOrder }}">
            </div>
            <div class="col-md-3 d-flex align-items-end">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="show_in_nav" {{ if .page.ShowInNav }}checked{{ end }}>
                    <label class="form-check-label" for="show_in_nav">Show in Nav</label>
                </div>
            </div>
            <div class="col-md-3 d-flex align-items-end">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="enabled" {{ if .page.Enabled }}checked{{ end }}>
                    <label class="form-check-label" for="enabled">Enabled</label>
                </div>
            </div>
        </div>

        <button type="button" class="btn btn-primary" onclick="savePage()">Save Page</button>
        <a href="/admin/pages" class="btn btn-secondary">Back to Pages</a>
        <a href="/{{ .page.Slug }}" class="btn btn-outline-primary" target="_blank">View Page</a>
    </form>
</div>

<script>
// Set the current post type filter value
var currentPostTypeID = {{ if .page.PostTypeID }}"{{ .page.PostTypeID }}"{{ else }}""{{ end }};
if (currentPostTypeID) {
    document.getElementById('post_type_id').value = currentPostTypeID;
}

document.getElementById('page_type').addEventListener('change', function() {
    var type = this.value;
    document.getElementById('scholar-section').style.display = (type === 'research') ? '' : 'none';
    document.getElementById('content-section').style.display = (type === 'writing' || type === 'research' || type === 'tags' || type === 'archives') ? 'none' : '';
    document.getElementById('post-type-filter-section').style.display = (type === 'writing') ? '' : 'none';
});

function savePage() {
    var postTypeVal = document.getElementById('post_type_id').value;
    var postTypeId = postTypeVal ? parseInt(postTypeVal) : null;

    var page = {
        "id": {{ .page.ID }},
        "title": document.getElementById('title').value,
        "slug": document.getElementById('slug').value,
        "page_type": document.getElementById('page_type').value,
        "hero_url": document.getElementById('hero_url').value,
        "hero_type": document.getElementById('hero_type').value,
        "content": document.getElementById('content').value,
        "scholar_id": document.getElementById('scholar_id').value,
        "nav_order": parseInt(document.getElementById('nav_order').value) || 0,
        "show_in_nav": document.getElementById('show_in_nav').checked,
        "enabled": document.getElementById('enabled').checked,
        "post_type_id": postTypeId
    };

    $.ajax({
        url: "/api/v1/pages",
        type: "PATCH",
        dataType: "json",
        contentType: "application/json",
        data: JSON.stringify(page),
        success: function(json) {
            document.getElementById('ajax-success').textContent = "Page saved successfully!";
            document.getElementById('ajax-success').style.display = '';
            document.getElementById('ajax-error').style.display = 'none';
            setTimeout(function() {
                document.getElementById('ajax-success').style.display = 'none';
            }, 3000);
        },
        error: function(jqXHR, textStatus, errorThrown) {
            document.getElementById('ajax-error').textContent = "Error saving page: " + (jqXHR.responseText || errorThrown);
            document.getElementById('ajax-error').style.display = '';
            document.getElementById('ajax-success').style.display = 'none';
        }
    });
}
</script>

{{ template "footer.html" .}}
