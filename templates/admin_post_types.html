{{ template "header.html" .}}
<div class="container">
    <div class="nav-scroller bg-body shadow-sm">
        <nav class="nav nav-underline" aria-label="Secondary navigation">
            <a class="nav-link" href="/admin/dashboard">Dashboard</a>
            <a class="nav-link" href="/admin/posts">All Posts</a>
            <a class="nav-link" href="/admin/newpost">New Post</a>
            <a class="nav-link" href="/admin/pages">Pages</a>
            <a class="nav-link active" aria-current="page" href="/admin/post-types">Post Types</a>
            <a class="nav-link" href="/admin/settings">Settings</a>
        </nav>
    </div>
    <h1>Post Types</h1>

    <div id="ajax-error" class="alert alert-danger" role="alert" style="display: none;"></div>
    <div id="ajax-success" class="alert alert-success" role="alert" style="display: none;"></div>

    <table class="table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Slug</th>
                <th>Description</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {{ range .post_types }}
            <tr>
                <td><a href="/admin/post-types/{{ .ID }}">{{ .Name }}</a></td>
                <td><a href="/{{ .Slug }}">/{{ .Slug }}</a></td>
                <td>{{ .Description }}</td>
                <td>
                    <a href="/admin/post-types/{{ .ID }}" class="btn btn-sm btn-outline-primary">Edit</a>
                    <button class="btn btn-sm btn-outline-danger" onclick="deletePostType({{ .ID }})">Delete</button>
                </td>
            </tr>
            {{ end }}
        </tbody>
    </table>

    <h2>Create New Post Type</h2>
    <form id="new-post-type-form">
        <div class="row mb-3">
            <div class="col-md-4">
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control" id="name" required>
            </div>
            <div class="col-md-4">
                <label for="slug" class="form-label">Slug</label>
                <div class="input-group">
                    <span class="input-group-text">/</span>
                    <input type="text" class="form-control" id="slug" required>
                </div>
            </div>
        </div>
        <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea class="form-control" id="description" rows="2"></textarea>
        </div>
        <button type="button" class="btn btn-primary" onclick="createPostType()">Create Post Type</button>
    </form>
</div>

<script>
function createPostType() {
    var pt = {
        "name": document.getElementById('name').value,
        "slug": document.getElementById('slug').value,
        "description": document.getElementById('description').value
    };
    $.ajax({
        url: "/api/v1/post-types",
        type: "POST",
        dataType: "json",
        contentType: "application/json",
        data: JSON.stringify(pt),
        success: function() {
            window.location.reload();
        },
        error: function(jqXHR) {
            document.getElementById('ajax-error').textContent = "Error: " + (jqXHR.responseText || "Unknown error");
            document.getElementById('ajax-error').style.display = '';
        }
    });
}

function deletePostType(id) {
    if (!confirm("Are you sure you want to delete this post type?")) return;
    $.ajax({
        url: "/api/v1/post-types",
        type: "DELETE",
        dataType: "json",
        contentType: "application/json",
        data: JSON.stringify({"id": id}),
        success: function() {
            window.location.reload();
        },
        error: function(jqXHR) {
            document.getElementById('ajax-error').textContent = "Error: " + (jqXHR.responseText || "Unknown error");
            document.getElementById('ajax-error').style.display = '';
        }
    });
}
</script>

{{ template "footer.html" .}}
