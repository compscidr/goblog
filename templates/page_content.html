{{ template "header.html" .}}

  {{ if .page.HasHero }}
  {{ if .page.IsVideo }}
  <div style="background-color: black; padding-top: 35%; height: 0px; position: relative; overflow: hidden; width: 100%;">
    <div>
      <video loop autoplay muted>
        <source src="{{ .page.HeroURL }}" type="video/mp4">
      </video>
    </div>
  </div>
  {{ else }}
  <div class="cover bg-left bg-center-l" style="background-image: url({{ .page.HeroURL }}); opacity: 0.8;">
    &nbsp;
  </div>
  {{ end }}
  {{ end }}

  <div class="container">
    <h1>{{ .page.Title }}</h1>
    {{ if .is_admin }}
    <p class="text-left"><a href="/admin/pages/{{ .page.ID }}">Edit this page</a></p>
    {{ end }}
    <div id="page-content"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/showdown/2.1.0/showdown.min.js" integrity="sha512-LhccdVNGe2QMEfI3x4DVV3ckMRe36TfydKss6mJpdHjNFiV07dFpS2xzeZedptKZrwxfICJpez09iNioiSZ3hA==" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js" integrity="sha512-H+rglffZ6G3gk0B8Lbl5PDagD3E9Bqu/ceria/CpBwOnOmRHKIaN2VhBPviGFn3LMQjgRTMjfCMSGGJiHaNXOQ==" crossorigin="anonymous"></script>
  <script>
    var converter = new showdown.Converter();
    var content = {{ .page.Content }};
    document.getElementById('page-content').innerHTML = DOMPurify.sanitize(converter.makeHtml(content));
  </script>

{{ template "footer.html" .}}
